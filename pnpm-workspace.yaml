packages:
  - packaging/tauri
  - packages/*

saveExact: true
engineStrict: true
packageImportMethod: hardlink
lockfileIncludeTarballUrl: true
linkWorkspacePackages: deep
injectWorkspacePackages: true
shamefullyHoist: true
fetchRetries: 15
strictDepBuilds: false
dedupePeers: true
dedupeDirectDeps: true

allowBuilds:
  '@skirtle/vue-vnode-utils': false
  esbuild: true
  unrs-resolver: true

catalogs:
  runtime:
    vue: 3.5.35
    '@vue/shared': 3.5.35
    '@vueuse/core': 14.3.0
    comlink: 4.4.2
    date-fns: 4.4.0
    i18next: 26.3.1
    i18next-vue: 5.4.0
    vuetify: 3.11.3
  development:
    find-up-simple: 1.0.1
    unplugin-vue-components: 32.1.0
